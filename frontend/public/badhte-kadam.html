document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f3f2f2;\n  --color-surface: #eae9e9;\n  --color-text: #201e1d;\n  --color-accent: #ec3013;\n  --color-accent-2: #e15b47;\n  --color-divider: color-mix(in srgb, #201e1d 40%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f8f4f4;\n  --color-neutral-200: #eae7e7;\n  --color-neutral-300: #d7d3d3;\n  --color-neutral-400: #bab6b6;\n  --color-neutral-500: #9b9797;\n  --color-neutral-600: #7d7979;\n  --color-neutral-700: #605d5d;\n  --color-neutral-800: #444141;\n  --color-neutral-900: #2d2b2b;\n\n  --color-accent-100: #fff2ef;\n  --color-accent-200: #ffe0d9;\n  --color-accent-300: #ffc4b8;\n  --color-accent-400: #ff9783;\n  --color-accent-500: #ff563c;\n  --color-accent-600: #dd2b0f;\n  --color-accent-700: #ae1800;\n  --color-accent-800: #7c1405;\n  --color-accent-900: #4d170e;\n\n  --color-accent-2-100: #fff2ef;\n  --color-accent-2-200: #ffe0da;\n  --color-accent-2-300: #ffc4b9;\n  --color-accent-2-400: #ff9784;\n  --color-accent-2-500: #ef6853;\n  --color-accent-2-600: #c94b39;\n  --color-accent-2-700: #9e3526;\n  --color-accent-2-800: #71261b;\n  --color-accent-2-900: #471d16;\n\n  --font-heading: \"Archivo\", system-ui, sans-serif;\n  --font-heading-weight: 800;\n  --font-body: \"Archivo\", system-ui, sans-serif;\n\n  --space-1: 4.0px;\n  --space-2: 8.0px;\n  --space-3: 12.0px;\n  --space-4: 16.0px;\n  --space-6: 24.0px;\n  --space-8: 32.0px;\n\n  --radius-sm: 0px;\n  --radius-md: 0px;\n  --radius-lg: 0px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); justify-content: flex-start; text-align: left; }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n -delay=\"100\" style=\"font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:clamp(40px,4.6vw,74px);line-height:1;letter-spacing:-.02em;margin:34px 0 52px;color:#23262b;\">Behind every number,<br>a <span style=\"font-style:italic;color:#b48a57;font-weight:800;\">life changed.<\u002Fspan><\u002Fh2>\n    <div data-mg=\"stories3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:2px solid #23262b;border-bottom:2px solid #23262b;\">\n      <div data-reveal=\"\" data-delay=\"0\" style=\"padding:36px 32px 36px 0;border-right:2px solid #23262b;\">\n        <p style=\"font-family:'Playfair Display',serif;font-weight:800;font-size:22px;margin:0;color:#23262b;\">Sunita<\u002Fp>\n        <p style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#b48a57;margin:6px 0 0;\">Rajasthan<\u002Fp>\n        <div style=\"border-left:2px solid #b48a57;padding-left:14px;margin:22px 0;\">\n          <p style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8f897c;margin:0;\">Before<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.5;margin:2px 0 0;color:#857f72;\">First in her family to finish school.<\u002Fp>\n          <p style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#b48a57;margin:12px 0 0;\">After<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.5;margin:2px 0 0;color:#23262b;font-weight:500;\">Now a civil engineer.<\u002Fp>\n        <\u002Fdiv>\n        <p style=\"font-size:15.5px;line-height:1.6;margin:0;color:#6f6a5f;\">A scholarship covered her fees; a mentor kept her going. Today she builds roads in her home district.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"120\" style=\"padding:36px 32px;border-right:2px solid #23262b;\">\n        <p style=\"font-family:'Playfair Display',serif;font-weight:800;font-size:22px;margin:0;color:#23262b;\">Imran<\u002Fp>\n        <p style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#b48a57;margin:6px 0 0;\">Uttar Pradesh<\u002Fp>\n        <div style=\"border-left:2px solid #b48a57;padding-left:14px;margin:22px 0;\">\n          <p style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8f897c;margin:0;\">Before<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.5;margin:2px 0 0;color:#857f72;\">Worked shifts to pay tuition.<\u002Fp>\n          <p style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#b48a57;margin:12px 0 0;\">After<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.5;margin:2px 0 0;color:#23262b;font-weight:500;\">Teaching maths in his village.<\u002Fp>\n        <\u002Fdiv>\n        <p style=\"font-size:15.5px;line-height:1.6;margin:0;color:#6f6a5f;\">With his stipend secured, he finished his degree and returned to teach the next cohort.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"240\" style=\"padding:36px 0 36px 32px;\">\n        <p style=\"font-family:'Playfair Display',serif;font-weight:800;font-size:22px;margin:0;color:#23262b;\">Lakshmi<\u002Fp>\n        <p style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#b48a57;margin:6px 0 0;\">Tamil Nadu<\u002Fp>\n        <div style=\"border-left:2px solid #b48a57;padding-left:14px;margin:22px 0;\">\n          <p style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8f897c;margin:0;\">Before<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.5;margin:2px 0 0;color:#857f72;\">Nearly dropped out after Class 10.<\u002Fp>\n          <p style=\"font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#b48a57;margin:12px 0 0;\">After<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.5;margin:2px 0 0;color:#23262b;font-weight:500;\">Studying medicine on a full ride.<\u002Fp>\n        <\u002Fdiv>\n        <p style=\"font-size:15.5px;line-height:1.6;margin:0;color:#6f6a5f;\">A mentorship circle helped her apply; a scholarship did the rest. She wants to open a rural clinic.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ INTERLUDE — BELONGING (centered statement + scattered gallery) ============================ -->\n<section id=\"belonging\" style=\"padding:clamp(80px,10vw,130px) 0 clamp(40px,6vw,72px);overflow:hidden;\">\n  <div style=\"max-width:1040px;margin:0 auto;padding:0 clamp(22px,5vw,64px);text-align:center;\">\n    <span data-reveal=\"\" style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#b48a57;\">Belonging<\u002Fspan>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Playfair Display',Georgia,serif;font-weight:800;font-size:clamp(32px,4.1vw,62px);line-height:1.06;letter-spacing:-.02em;margin:22px auto 0;max-width:20ch;color:#23262b;\">\n      A place here is not given.\n      <span style=\"display:inline-block;background:#d3c7a2;padding:.02em .24em;font-style:italic;font-weight:800;color:#23262b;\">It is grown over time.<\u002Fspan>\n    <\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"200\" style=\"font-size:17px;line-height:1.68;max-width:52ch;margin:24px auto 0;color:#6f6a5f;\">We don't chase scale for its own sake. Every scholar joins a community built on trust, mentorship and years of showing up — not a number on a report.<\u002Fp>\n    <div data-reveal=\"\" data-delay=\"300\" style=\"margin-top:34px;\">\n      <button data-magnetic=\"\" type=\"button\" style=\"background:#1e2c34;color:#ece7db;border:2px solid #1e2c34;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;letter-spacing:.1em;t nity photo\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div data-reveal=\"\" data-delay=\"320\" class=\"grayscale zoomframe\" style=\"width:190px;aspect-ratio:3/4;border:2px solid #23262b;overflow:hidden;background:#1e2c34;transform:rotate(-4deg);margin-top:38px;box-shadow:0 16px 34px rgba(20,26,30,.22);\">\n      <image-slot id=\"bel-5\" class=\"zoomimg\" shape=\"rect\" fit=\"cover\" placeholder=\"Community photo\"><\u002Fimage-slot>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ CHAPTER 06 — WHY US ============================ -->\n<section id=\"why\" style=\"padding:clamp(80px,10vw,140px) 0;background:#dbd3c3;border-top:2px solid #23262b;border-bottom:2px solid #23262b;\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(22px,5vw,64px);\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\">\n      <span style=\"width:12px;height:12px;background:#b48a57;\"><\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#b48a57;\">Chapter 06 — Why Us<\u002Fspan>\n    <\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:clamp(40px,4.6vw,74px);line-height:1;letter-spacing:-.02em;margin:34px 0 56px;color:#23262b;\">What we <span style=\"font-style:italic;color:#556571;font-weight:800;\">stand for.<\u002Fspan><\u002Fh2>\n    <div data-mg=\"why3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(28px,4vw,56px);\">\n      <div data-reveal=\"\" data-delay=\"0\" style=\"border-top:2px solid #23262b;padding-top:24px;\">\n        <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:#b48a57;\">01<\u002Fspan>\n        <h3 style=\"font-family:'Playfair Display',serif;font-weight:800;font-size:30px;margin:16px 0 0;color:#23262b;\">Integrity<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.6;margin:14px 0 0;color:#6f6a5f;\">We are transparent about how every rupee is raised and where it goes.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"120\" style=\"border-top:2px solid #23262b;padding-top:24px;\">\n        <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:#b48a57;\">02<\u002Fspan>\n        <h3 style=\"font-family:'Playfair Display',serif;font-weight:800;font-size:30px;margin:16px 0 0;color:#23262b;\">Dignity<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.6;margin:14px 0 0;color:#6f6a5f;\">We support scholars as partners in their own progress — never as charity cases.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-delay=\"240\" style=\"border-top:2px solid #23262b;padding-top:24px;\">\n        <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:#b48a57;\">03<\u002Fspan>\n        <h3 style=\"font-family:'Playfair Display',serif;font-weight:800;font-size:30px;margin:16px 0 0;color:#23262b;\">Community<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.6;margin:14px 0 0;color:#6f6a5f;\">Lasting change happens when communities lead their own way forward.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ CHAPTER 07 — VOICES ============================ -->\n<section id=\"voices\" style=\"padding:clamp(90px,11vw,160px) 0;\">\n  <div style=\"max-width:1040px;margin:0 auto;padding:0 clamp(22px,5vw,64px);\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\">\n      <span style=\"width:12px;height:12px;background:#b48a57;\"><\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#b48a57;\">Chapter 07 — Voices<\u002Fspan>\n    <\u002Fdiv>\n    <blockquote data-reveal=\"\" data-delay=\"120\" style=\"font-family:'Playfair Display',Georgia,serif;font-weight:800;font-style:italic;font-size:clamp(30px,4.2vw,58px);line-height:1.12;letter-spacing:-.015em;color:#556571;margin:40px 0 0;\">“Badhte Kadam did not just pay my fees. They believed a girl from my village could become a doctor — and then made sure I stayed the course.”<\u002Fblockquote>\n    <p data-reveal=\"\" data-delay=\"220\" style=\"font-family:'Space Mono',monospace;font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:#23262b;margin:34px 0 0;\">— Lakshmi R. · Scholar, Class of 2021<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================ CHAPTER 08 — GET INVOLVED (RED CLOSE) ============================ -->\n<section id=\"contact\" style=\"background:#b48a57;border-top:3px solid #23262b;\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(72px,9vw,128px) clamp(22px,5vw,64px);\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:12px;\">\n      <span style=\"width:12px;height:12px;background:#23262b;\"><\u002Fspan>\n      <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#2c1a10;\">Chapter 08 — Get Involved<\u002Fspan>\n    <\u002Fdiv>\n    <h2 data-reveal=\"\" data-delay=\"100\" style=\"font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:clamp(48px,7vw,112px);line-height:.94;letter-spacing:-.025em;color:#ece7db;margin:28px 0 0;\">Open a door.<br><span style=\"font-style:italic;font-weight:800;color:#23262b;\">Today.<\u002Fspan><\u002Fh2>\n    <p data-reveal=\"\" data-delay=\"180\" style=\"font-size:19px;line-height:1.6;max-width:46ch;color:#ece7db;margin:28px 0 0;\">Whether through a donation, mentorship or your time, your support keeps a scholar on their path.<\u002Fp>\n    <div data-reveal=\"\" data-delay=\"260\" style=\"display:flex;flex-wrap:wrap;gap:16px;margin-top:40px;\">\n      <button data-magnetic=\"\" type=\"button\" style=\"background:#1e2c34;color:#ece7db;bo ;letter-spacing:.12em;text-transform:uppercase;color:#ece7db;margin:0 0 16px;\">Quick Links<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <a href=\"#scholars\" style=\"font-size:15px;color:#b3ada0;text-decoration:none;\">Scholars<\u002Fa>\n        <a href=\"#about\" style=\"font-size:15px;color:#b3ada0;text-decoration:none;\">About Us<\u002Fa>\n        <a href=\"#contact\" style=\"font-size:15px;color:#b3ada0;text-decoration:none;\">Get Involved<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <p style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#ece7db;margin:0 0 16px;\">Contact<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:10px;font-size:15px;color:#b3ada0;\">\n        <span>hello@badhtekadam.org<\u002Fspan>\n        <span>+91 98765 43210<\u002Fspan>\n        <span>Pune, Maharashtra, India<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-top:2px solid #33424c;padding:18px 0;text-align:center;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;color:#7d786c;\">© 2026 Badhte Kadam. All rights reserved.<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() { this._t = setTimeout(() => this.enhance(), 80); }\n  componentWillUnmount() {\n    clearTimeout(this._t);\n    if (this._io) this._io.disconnect();\n    if (this._cio) this._cio.disconnect();\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n  }\n  enhance() {\n    try {\n      const root = document.querySelector('[data-root]');\n      if (root) root.classList.add('js');\n\n      this._io = new IntersectionObserver((es) => {\n        es.forEach((e) => {\n          if (e.isIntersecting) {\n            const el = e.target;\n            const d = el.getAttribute('data-delay');\n            if (d) el.style.transitionDelay = d + 'ms';\n            el.classList.add('in');\n            this._io.unobserve(el);\n          }\n        });\n      }, { threshold: 0.15, rootMargin: '0px 0px -6% 0px' });\n      document.querySelectorAll('[data-reveal]').forEach((el) => this._io.observe(el));\n\n      this._cio = new IntersectionObserver((es) => {\n        es.forEach((e) => {\n          if (e.isIntersecting) { this.countUp(e.target); this._cio.unobserve(e.target); }\n        });\n      }, { threshold: 0.6 });\n      document.querySelectorAll('[data-count]').forEach((n) => this._cio.observe(n));\n\n      document.querySelectorAll('[data-magnetic]').forEach((btn) => {\n        btn.addEventListener('mousemove', (ev) => {\n          const r = btn.getBoundingClientRect();\n          const x = ev.clientX - r.left - r.width / 2;\n          const y = ev.clientY - r.top - r.height / 2;\n          btn.style.transform = `translate(${x * 0.22}px, ${y * 0.34}px)`;\n        });\n        btn.addEventListener('mouseleave', () => { btn.style.transform = 'translate(0,0)'; });\n      });\n\n      const nav = document.querySelector('[data-nav]');\n      const plx = document.querySelectorAll('[data-parallax]');\n      this._onScroll = () => {\n        const y = window.scrollY;\n        if (nav) {\n          if (y > 20) {\n            nav.style.background = 'rgba(232,226,214,.94)';\n            nav.style.backdropFilter = 'blur(8px)';\n            nav.style.borderBottomColor = '#23262b';\n            nav.style.boxShadow = '0 6px 22px rgba(20,26,30,.09)';\n          } else {\n            nav.style.background = 'transparent';\n            nav.style.backdropFilter = 'none';\n            nav.style.borderBottomColor = 'transparent';\n            nav.style.boxShadow = 'none';\n          }\n        }\n        plx.forEach((p) => {\n          const f = parseFloat(p.getAttribute('data-parallax')) || 0.05;\n          p.style.transform = `translateY(${Math.max(-70, y * -f)}px)`;\n        });\n      };\n      this._onScroll();\n      window.addEventListener('scroll', this._onScroll, { passive: true });\n\n      const toggle = document.querySelector('[data-navtoggle]');\n      const panel = document.querySelector('[data-navpanel]');\n      if (toggle && panel) {\n        const setOpen = (open) => {\n          panel.style.display = 'block';\n          requestAnimationFrame(() => {\n            panel.style.maxHeight = open ? panel.scrollHeight + 'px' : '0px';\n          });\n          toggle.setAttribute('data-open', open ? '1' : '0');\n        };\n        toggle.addEventListener('click', () => {\n          setOpen(toggle.getAttribute('data-open') !== '1');\n        });\n        document.querySelectorAll('[data-navclose]').forEach((a) => {\n          a.addEventListener('click', () => setOpen(false));\n        });\n      }\n    } catch (err) { /* no-op */ }\n  }\n  countUp(el) {\n    const target = parseFloat(el.getAttribute('data-count'));\n    const suf = el.getAttribute('data-suffix') || '';\n    const dur = 1300;\n    const t0 = performance.now();\n    const step = (t) => {\n      const p = Math.min(1, (t - t0) / dur);\n      const eased = 1 - Math.pow(1 - p, 3);\n      el.textContent = Math.round(eased * target) + suf;\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
  <script>
    (function () {
      function normalize(text) {
        return (text || '').replace(/\s+/g, ' ').trim().toLowerCase();
      }
      function goTop(path) {
        var target = window.top || window;
        target.location.href = path;
      }
      document.addEventListener(
        'click',
        function (e) {
          var el = e.target && e.target.closest('a[href="#scholars"], a[href="#about"], button');
          if (!el) return;
          var label = normalize(el.textContent);
          var href = el.getAttribute && el.getAttribute('href');
          if (href === '#scholars' || label.indexOf('view all scholars') === 0 || label.indexOf('meet the scholars') === 0) {
            e.preventDefault();
            e.stopPropagation();
            goTop('/scholars');
            return;
          }
          if (href === '#about' || label.indexOf('read our story') === 0) {
            e.preventDefault();
            e.stopPropagation();
            goTop('/about');
          }
        },
        true
      );
    })();
  </script>
